<!-- CONTEÚDO PRINCIPAL QUANDO LOGADO -->
<div *ngIf="isAuthenticated" class="min-h-screen bg-gray-900">
  <!-- Menu Sidebar -->
  <div class="flex">
    <!-- Sidebar -->
    <div class="w-[13%] bg-gray-800 min-h-screen border-r border-gray-700 sidebar overflow-hidden">
      <p-menu 
        [model]="menuItens()" 
        styleClass="w-full border-none bg-transparent"
        class="p-menu-custom w-full">
        
        <!-- Logo/Header -->
        <ng-template pTemplate="start">
          <div class="inline-flex items-center gap-1 px-2 py-2">
            <svg width="33" height="35" viewBox="0 0 33 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="..." fill="#6366F1" />
            </svg>
            <span class="text-xl font-semibold text-white">
                Price<span class="text-primary">OFF</span>
            </span>
          </div>
        </ng-template>

        <!-- Submenu Header -->
        <ng-template pTemplate="submenuheader" let-item>
          <span class="text-primary font-bold">{{ item.label }}</span>
        </ng-template>

        <!-- Itens do Menu -->
        <ng-template pTemplate="item" let-item>
          <a pRipple class="flex items-center px-3 py-2 cursor-pointer text-gray-300 hover:text-white hover:bg-gray-700 rounded">
            <span [class]="item.icon"></span>
            <span class="ms-2">{{ item.label }}</span>
            <p-badge *ngIf="item.badge" class="ms-auto" [value]="item.badge" />
            <span *ngIf="item.shortcut" class="ms-auto border border-gray-600 rounded bg-gray-800 text-gray-400 text-xs p-1">
              {{ item.shortcut }}
            </span>
          </a>
        </ng-template>

        <!-- Perfil do Usuário -->
        <ng-template pTemplate="end">
          <button pRipple class="relative overflow-hidden w-full border-0 bg-transparent flex items-center p-2 hover:bg-gray-700 rounded cursor-pointer">
            <p-avatar image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png" 
                     class="mr-2" 
                     shape="circle" 
                     size="normal" />
            <span class="inline-flex flex-col text-left">
              <span class="font-bold text-white">Amy Elsner</span>
              <span class="text-sm text-gray-400">Admin</span>
            </span>
          </button>
        </ng-template>
      </p-menu>
    </div>

    <!-- Conteúdo Principal -->
    <div class="flex-1 p-6">
      <router-outlet></router-outlet>
      <!-- Aqui vai o conteúdo das suas páginas -->
    </div>
  </div>
</div>

<!-- MODAL DE AUTENTICAÇÃO (quando NÃO logado) -->
<div *ngIf="!isAuthenticated" class="min-h-screen flex items-center justify-center bg-gray-900 p-4">
  <div class="w-full max-w-md">
    <!-- Cartão de Autenticação -->
    <div class="bg-gray-800 rounded-2xl shadow-2xl overflow-hidden border border-gray-700">

      <!-- <div>
        <p> Espaço para por a logo do projeto </p>
      </div> -->

      <!-- Corpo do Cartão -->
      <div class="px-6 py-8">
        <!-- Abas de Login/Registro -->
        <div class="flex gap-4 mb-8 border-b border-gray-700">
          <button
            (click)="setAuthMode('login')"
            [class.active-tab]="authMode === 'login'"
            class="flex-1 py-3 px-4 text-center font-semibold transition-colors duration-200"
            [ngClass]="{
              'text-indigo-500 border-b-2 border-indigo-500': authMode === 'login',
              'text-gray-400 hover:text-gray-300': authMode !== 'login'
            }"
          >
            <i class="pi pi-sign-in mr-2"></i> Login
          </button>
          <button
            (click)="setAuthMode('register')"
            [class.active-tab]="authMode === 'register'"
            class="flex-1 py-3 px-4 text-center font-semibold transition-colors duration-200"
            [ngClass]="{
              'text-indigo-500 border-b-2 border-indigo-500': authMode === 'register',
              'text-gray-400 hover:text-gray-300': authMode !== 'register'
            }"
          >
            <i class="pi pi-user-plus mr-2"></i> Registrar
          </button>
        </div>

        <!-- Conteúdo das Abas -->
        <div *ngIf="authMode === 'login'" class="animate-fadeIn">
          <app-login 
            (authSuccess)="onAuthSuccess()"
            (authError)="onAuthError($event)"
          ></app-login>
        </div>

        <div *ngIf="authMode === 'register'" class="animate-fadeIn">
          <app-register 
            (authSuccess)="onAuthSuccess()"
            (authError)="onAuthError($event)"
          ></app-register>
        </div>

        <!-- Mensagem de Erro Global -->
        <div *ngIf="globalError" class="mt-4 p-3 bg-red-900/30 border border-red-500 rounded-lg">
          <p class="text-red-300 text-sm flex items-center">
            <i class="pi pi-exclamation-circle mr-2"></i>
            {{ globalError }}
          </p>
        </div>

        <!-- Rodapé -->
        <div class="mt-6 text-center text-gray-400 text-xs">
          <p>Ao continuar, você concorda com nossos</p>
          <a href="#" class="text-indigo-400 hover:text-indigo-300">Termos de Serviço</a>
          <span> e </span>
          <a href="#" class="text-indigo-400 hover:text-indigo-300">Política de Privacidade</a>
        </div>
      </div>
    </div>

    <!-- Informações Adicionais -->
    <div class="mt-6 text-center text-gray-400 text-sm">
      <p>Todos direitos reservados a PriceOff</p>
    </div>
  </div>
</div>
