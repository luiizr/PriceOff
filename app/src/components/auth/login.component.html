<div class="w-full">
  <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
    <!-- Email Input -->
    <div class="relative">
      <div class="flex items-center">
        <i class="pi pi-envelope text-gray-400 mr-3"></i>
        <label for="email" class="text-sm font-semibold text-white">Email</label>
      </div>
      <input
        type="email"
        id="email"
        name="email"
        [(ngModel)]="email"
        placeholder="Digite seu email"
        required
        class="w-full mt-2 px-4 py-3 rounded-lg bg-gray-900 text-gray-100 border border-gray-700 placeholder-gray-500 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/20 focus:outline-none transition duration-200"
        [class.border-red-500]="error || (loginForm.submitted && !email)"
      />
      <small *ngIf="loginForm.submitted && !email" class="text-red-400 text-xs mt-1 block ml-9">Email é obrigatório</small>
      <small *ngIf="error && email && !isValidEmail(email)" class="text-red-400 text-xs mt-1 block ml-9">Email inválido</small>
    </div>

    <!-- Password Input -->
    <div class="relative">
      <div class="flex items-center">
        <i class="pi pi-lock text-gray-400 mr-3"></i>
        <label for="password" class="text-sm font-semibold text-white">Senha</label>
      </div>
      <div class="relative mt-2">
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Digite sua senha"
          required
          class="w-full px-4 py-3 rounded-lg bg-gray-900 text-gray-100 border border-gray-700 placeholder-gray-500 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/20 focus:outline-none transition duration-200"
          [class.border-red-500]="error || (loginForm.submitted && !password)"
        />
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-300"
        >
          <i [class]="showPassword ? 'pi pi-eye' : 'pi pi-eye-slash'"></i>
        </button>
      </div>
      <div class="flex items-center justify-end mt-2">
        <a href="#" class="text-indigo-400 hover:text-indigo-300 text-xs font-medium">Esqueceu a senha?</a>
      </div>
    </div>

    <!-- Keep Connected Checkbox -->
    <div class="flex items-center">
      <input
        type="checkbox"
        id="keepConnected"
        name="keepConnected"
        class="w-4 h-4 rounded bg-gray-900 border border-gray-700 cursor-pointer accent-indigo-500"
      />
      <label for="keepConnected" class="ml-3 text-sm font-semibold text-gray-300 cursor-pointer">
        Manter conectado
      </label>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="bg-red-900/20 border border-red-600 text-red-300 px-4 py-3 rounded-lg text-sm flex items-start gap-2 animate-shake">
      <i class="pi pi-exclamation-circle flex-shrink-0 mt-0.5"></i>
      <span>{{ error }}</span>
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      [disabled]="loading || !email || !password"
      [class.opacity-50]="!email || !password"
      class="w-full mt-6 px-4 py-3 bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 disabled:from-gray-400 disabled:to-gray-400 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-lg"
    >
      <span *ngIf="!loading">
        <i class="pi pi-sign-in mr-2"></i>
        Entrar
      </span>
      <span *ngIf="loading" class="flex items-center">
        <i class="pi pi-spin pi-spinner mr-2"></i>
        Entrando...
      </span>
    </button>

    <!-- Divider -->
    <div class="mt-6 relative">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-700"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 bg-gray-800 text-gray-400">ou</span>
      </div>
    </div>

    <!-- Google Login Button -->
    <button
      type="button"
      disabled
      title="Google login - em breve"
      class="w-full mt-6 px-4 py-3 bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed text-gray-300 font-semibold rounded-lg transition duration-200 flex items-center justify-center gap-3 border border-gray-600"
    >
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google
    </button>
  </form>
</div>
